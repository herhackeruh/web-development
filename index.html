<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Anshi 💖🎂</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #ffc1d6);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      text-align: center;
    }

    .hero {
      padding: 40px 20px 30px;
    }

    .photo {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      border: 12px solid #fff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      object-fit: cover;
      margin: 20px auto;
      display: block;
      animation: float 4s ease-in-out infinite;
    }

    h1 {
      font-size: 3.8rem;
      margin: 15px 0 10px;
      text-shadow: 0 10px 30px rgba(255, 105, 180, 0.7);
      animation: glow 2s infinite alternate;
    }

    .subtitle {
      font-size: 1.6rem;
      margin-bottom: 30px;
      opacity: 0.95;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      max-width: 850px;
      margin: 40px auto;
      padding: 0 20px;
    }

    button {
      padding: 18px 34px;
      font-size: 1.25rem;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      border: 3px solid #fff;
      color: white;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.4s ease;
      backdrop-filter: blur(10px);
    }

    button:hover {
      background: #ff69b4;
      transform: scale(1.12) translateY(-6px);
      box-shadow: 0 15px 35px rgba(255, 105, 180, 0.6);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: #fff;
      color: #333;
      padding: 40px 35px;
      border-radius: 25px;
      max-width: 520px;
      width: 92%;
      box-shadow: 0 25px 70px rgba(0,0,0,0.4);
      position: relative;
    }

    .close {
      position: absolute;
      top: 15px; right: 25px;
      font-size: 2.2rem;
      cursor: pointer;
      color: #ff69b4;
    }

    .message {
      font-size: 1.4rem;
      line-height: 1.85;
      margin: 25px 0;
    }

    .confetti { 
      position: absolute; 
      width: 12px; 
      height: 12px; 
      border-radius: 50%; 
      animation: fall linear forwards; 
    }

    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }
    @keyframes glow { from { text-shadow: 0 0 20px #fff; } to { text-shadow: 0 0 55px #ff1493; } }
    @keyframes fall { to { transform: translateY(120vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Happy Birthday Anshi! 🎉💕</h1>
    <p class="subtitle">Click any button to open a special wish just for you ✨</p>

    <!-- Anshi's Photo - Direct & Stable Link -->
    <img src="anshiiii.jpeg" 
         alt="Anshi" 
         class="photo"
         onerror="this.src='https://via.placeholder.com/280?text=Anshi';">

    <div class="buttons">
      <button onclick="showWish(1)">💖 Wish 1 - Love & Joy</button>
      <button onclick="showWish(2)">🌟 Wish 2 - Success & Dreams</button>
      <button onclick="showWish(3)">🎉 Wish 3 - Fun & Adventures</button>
      <button onclick="showWish(4)">🌸 Wish 4 - Endless smiles </button>
      <button onclick="randomWish()">🎁 Surprise Wish</button>
    </div>

    <button onclick="launchConfetti()" style="margin-top:15px; background:#ff1493; font-size:1.3rem;">
      ✨ Launch More Confetti
    </button>
  </div>

  <!-- Wish Modal -->
  <div class="modal" id="wishModal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <h2 id="modalTitle" style="color:#ff69b4; margin-bottom:15px;"></h2>
      <p class="message" id="modalMessage"></p>
      <p style="margin-top:25px; font-size:1.2rem; color:#ff69b4;">— With love from Aditya ❤️</p>
    </div>
  </div>

  <script>
    const wishes = {
      1: { title: "💖 Love & Endless Joy", 
           message: "Dear Anshi, may your life be filled with endless love, happiness, and all the beautiful moments you deserve. You are truly special!" },
      2: { title: "🌟 Success & Big Dreams", 
           message: "Wishing you massive success and the courage to chase all your dreams. May this year bring you achievements and growth!" },
      3: { title: "🎉 Fun & Adventures", 
           message: "Here's to more laughter, crazy adventures, unforgettable memories, and tons of fun this year!" },
      4: { title: "🌸 Sweet Memories", 
           message: "Thank you for being such an amazing friend. May this birthday be as sweet and beautiful as you are. Keep shining!" }
    };

    function showWish(num) {
      const modal = document.getElementById('wishModal');
      document.getElementById('modalTitle').innerHTML = wishes[num].title;
      document.getElementById('modalMessage').innerHTML = wishes[num].message;
      modal.style.display = 'flex';
      launchConfetti();
    }

    function randomWish() {
      const keys = Object.keys(wishes);
      const random = keys[Math.floor(Math.random() * keys.length)];
      showWish(parseInt(random));
    }

    function closeModal() {
      document.getElementById('wishModal').style.display = 'none';
    }

    function launchConfetti() {
      for (let i = 0; i < 180; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = ['#ff69b4','#ffd700','#ff1493','#00ff7f','#87cefa'][Math.floor(Math.random()*5)];
        confetti.style.width = confetti.style.height = (Math.random() * 14 + 8) + 'px';
        confetti.style.animationDuration = (Math.random() * 4 + 3) + 's';
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 8000);
      }
    }

    // Auto effects on load
    window.onload = () => {
      setTimeout(() => launchConfetti(), 800);
      
      // Floating hearts
      setInterval(() => {
        if (Math.random() > 0.4) {
          const heart = document.createElement('div');
          heart.textContent = ['💖','❤️','💕','🌸'][Math.floor(Math.random()*4)];
          heart.style.position = 'fixed';
          heart.style.fontSize = '2.8rem';
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.top = '-80px';
          heart.style.opacity = '0.75';
          heart.style.zIndex = '-1';
          document.body.appendChild(heart);

          let y = -80;
          const speed = Math.random() * 2.5 + 2;
          const anim = setInterval(() => {
            y += speed;
            heart.style.top = y + 'px';
            if (y > window.innerHeight + 100) {
              heart.remove();
              clearInterval(anim);
            }
          }, 25);
        }
      }, 350);
    };

    window.onclick = function(e) {
      if (e.target.id === 'wishModal') closeModal();
    }
  </script>
</body>
</html>
