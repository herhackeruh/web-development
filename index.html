<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anshi 💖🎂</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4, #a18cd1, #ffc1d6);
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

.hero { padding: 40px 20px; }

.photo {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  border: 12px solid #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  object-fit: cover;
  margin: 20px auto;
  animation: float 4s ease-in-out infinite;
}

h1 {
  font-size: 3.8rem;
  text-shadow: 0 10px 30px rgba(255, 105, 180, 0.7);
  animation: glow 2s infinite alternate;
}

.subtitle {
  font-size: 1.6rem;
  margin-bottom: 20px;
}

.buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  margin-top: 30px;
}

button {
  padding: 16px 30px;
  font-size: 1.2rem;
  border-radius: 50px;
  border: 2px solid #fff;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff69b4;
  transform: scale(1.1);
}

/* 🎵 MUSIC BUTTON */
.music-btn {
  margin-top: 20px;
  padding: 16px 35px;
  font-size: 1.3rem;
  border-radius: 50px;
  border: none;
  background: linear-gradient(45deg, #ff1493, #ff69b4, #a18cd1);
  box-shadow: 0 0 20px #ff69b4;
  animation: pulse 1.5s infinite;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background: #fff;
  color: #333;
  padding: 35px;
  border-radius: 20px;
  max-width: 500px;
}

.close {
  font-size: 2rem;
  cursor: pointer;
  color: #ff1493;
}

/* CONFETTI */
.confetti {
  position: fixed;
  top: -10px;
  border-radius: 50%;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(120vh) rotate(720deg);
    opacity: 0;
  }
}

/* ANIMATIONS */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

@keyframes glow {
  from { text-shadow: 0 0 20px #fff; }
  to { text-shadow: 0 0 50px #ff1493; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}
</style>
</head>

<body>

<div class="hero">
  <h1>Happy Birthday Anshi! 🎉💕</h1>
  <p class="subtitle">Click any button to open a special wish ✨</p>

  <img src="anshiiii.jpeg" class="photo">

  <div class="buttons">
    <button onclick="showWish(1)">💖 First wish :- Love & Joy</button>
    <button onclick="showWish(2)">🌟 Second wish :- Dreams</button>
    <button onclick="showWish(3)">🎉 Third wish :- Fun</button>
    <button onclick="showWish(4)">🌸 Fourth wish :- Smiles</button>
  </div>

  <button class="music-btn" onclick="toggleMusic()">🎶 Play Music</button>

  <audio id="songPlayer" loop>
    <source src="SHARMEELI - Frappe Ash _ toorjo dey (Official Music Video) _ 5.5 Records(MP3_160K).mp3" type="audio/mpeg">
  </audio>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="title"></h2>
    <p id="msg"></p>
    <p style="margin-top:20px;color:#ff1493;">— With love from Aditya ❤️</p>
  </div>
</div>

<script>
const wishes = {
  1: "Dear Anshi, may your life be filled with endless love, happiness, and all the beautiful moments you deserve. You are truly special!",
  2: "Wishing you massive success and the courage to chase all your dreams. May this year bring you achievements and growth!",
  3: "Here's to more laughter, crazy adventures, unforgettable memories, and tons of fun this year!",
  4: "Thank you for being such an amazing friend. May this birthday be as sweet and beautiful as you are. Keep shining!"
};

function showWish(num) {
  document.getElementById("title").innerText = "💖 Special Wish";
  document.getElementById("msg").innerText = wishes[num];
  document.getElementById("modal").style.display = "flex";

  launchConfetti();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* 🎵 MUSIC */
function toggleMusic() {
  const music = document.getElementById("songPlayer");
  const btn = document.querySelector(".music-btn");

  if (music.paused) {
    music.play();
    btn.innerText = "⏸ Pause Music";
  } else {
    music.pause();
    btn.innerText = "🎶 Play Music";
  }
}

/* 🎉 CONFETTI + FIREWORKS */
function launchConfetti() {
  for (let i = 0; i < 120; i++) {
    const c = document.createElement('div');
    c.classList.add('confetti');
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = ['#ff69b4','#ffd700','#00ff7f','#87cefa'][Math.floor(Math.random()*4)];
    c.style.width = c.style.height = (Math.random()*8+6)+'px';
    c.style.animationDuration = (Math.random()*3+2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }

  for(let i=0;i<5;i++) createFirework();
}

/* 🎆 FIREWORK */
function createFirework(){
  const x=Math.random()*window.innerWidth;
  const y=Math.random()*window.innerHeight/2;

  for(let i=0;i<30;i++){
    const s=document.createElement('div');
    s.style.position='fixed';
    s.style.left=x+'px';
    s.style.top=y+'px';
    s.style.width='6px';
    s.style.height='6px';
    s.style.borderRadius='50%';
    s.style.background=['#ff69b4','#ffd700','#00ff7f','#87cefa'][Math.floor(Math.random()*4)];
    document.body.appendChild(s);

    const angle=Math.random()*2*Math.PI;
    const dist=Math.random()*100+50;

    s.animate([
      {transform:'translate(0,0)',opacity:1},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`,opacity:0}
    ],{duration:1000});

    setTimeout(()=>s.remove(),1000);
  }
}

/* ❤️ FLOATING HEARTS */
setInterval(()=>{
  const h=document.createElement('div');
  h.textContent=['💖','❤️','💕','🌸'][Math.floor(Math.random()*4)];
  h.style.position='fixed';
  h.style.left=Math.random()*100+'vw';
  h.style.top='-50px';
  h.style.fontSize='2rem';
  document.body.appendChild(h);

  let y=-50;
  const speed=Math.random()*2+2;

  const anim=setInterval(()=>{
    y+=speed;
    h.style.top=y+'px';
    if(y>window.innerHeight){
      h.remove();
      clearInterval(anim);
    }
  },20);
},300);
</script>

</body>
</html>
